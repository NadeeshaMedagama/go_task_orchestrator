# ============================================================================
# Dependabot Configuration
# ============================================================================
# Automatically creates PRs for dependency updates in Go (backend),
# npm (frontend), GitHub Actions, and Docker.
# ============================================================================

version: 2

updates:
  # ── Go (Backend) ─────────────────────────────────────────────────────────
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "backend"
      - "go"
    commit-message:
      prefix: "deps(backend):"
    groups:
      crypto:
        patterns:
          - "golang.org/x/crypto*"

  # ── npm (Frontend) ───────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "frontend"
      - "javascript"
    commit-message:
      prefix: "deps(frontend):"
    groups:
      next-js:
        patterns:
          - "next*"
          - "eslint-config-next"
      react:
        patterns:
          - "react*"
          - "@types/react*"

  # ── GitHub Actions ───────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci:"

  # ── Docker (Deployments) ───────────────────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/deployments/docker"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "docker"
      - "backend"
    commit-message:
      prefix: "docker(backend):"

  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "docker"
      - "frontend"
    commit-message:
      prefix: "docker(frontend):"

