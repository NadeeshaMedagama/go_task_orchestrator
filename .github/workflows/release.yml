name: Release

# ============================================================================
# Automated release workflow:
# 1. Validates that branch is ready for release
# 2. Runs full test suite
# 3. Builds and publishes artifacts
# 4. Creates release with changelog
# 5. Updates version and documentation
# ============================================================================

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.2.3 or patch/minor/major)'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      release-notes:
        description: 'Release notes'
        required: false
        type: string

permissions:
  contents: write
  packages: write
  pull-requests: write
  deployments: write

env:
  GO_VERSION: '1.23'
  NODE_VERSION: '20'

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calculate-version.outputs.version }}
      tag: ${{ steps.calculate-version.outputs.tag }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: calculate-version
        run: |
          # Get latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          LATEST_VERSION=${LATEST_TAG#v}
          
          # Parse version parts
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}
          
          # Calculate new version
          case "${{ github.event.inputs.version }}" in
            patch)
              PATCH=$((PATCH + 1))
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            *)
              NEWVERSION=${{ github.event.inputs.version }}
              ;;
          esac
          
          NEWVERSION="${NEWVERSION:-${MAJOR}.${MINOR}.${PATCH}}"
          TAG="v${NEWVERSION}"
          
          echo "version=${NEWVERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "📌 Next version: $TAG"

  validate-release:
    name: Validate Release
    runs-on: ubuntu-latest
    needs: prepare-release
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run Go tests
        run: go test -v -race ./...

      - name: Run Go linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint frontend
        working-directory: ./frontend
        run: npm run lint

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Check format
        run: |
          go fmt ./...
          git diff --exit-code || (echo "Code formatting issues detected" && exit 1)

  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [prepare-release, validate-release]
    
    strategy:
      matrix:
        service: [api-gateway, auth-service, task-service]
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build ${{ matrix.service }} for ${{ matrix.goos }}/${{ matrix.goarch }}
        run: |
          mkdir -p ./dist/release
          OUTPUT_NAME="${{ matrix.service }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            OUTPUT_NAME="${OUTPUT_NAME}.exe"
          fi
          
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build \
            -ldflags "-X main.Version=${{ needs.prepare-release.outputs.version }} -X main.BuildTime=$(date -u '+%Y-%m-%dT%H:%M:%SZ') -X main.Commit=$(git rev-parse HEAD)" \
            -o ./dist/release/${OUTPUT_NAME} \
            ./cmd/${{ matrix.service }}/main.go

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.service }}-${{ matrix.goos }}-${{ matrix.goarch }}-builds
          path: ./dist/release/
          retention-days: 1
          overwrite: true

  generate-changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs: prepare-release
    outputs:
      changelog: ${{ steps.changelog.outputs.content }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"%h - %s (%an)" --reverse)
          else
            CHANGELOG=$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"%h - %s (%an)" | grep -v "Merge pull request" | head -50)
          fi

          echo "content<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare-release, build-release, generate-changelog]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./release-artifacts

      - name: Prepare release notes
        id: prepare-notes
        env:
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
          CHANGELOG: ${{ needs.generate-changelog.outputs.changelog }}
          USER_RELEASE_NOTES: ${{ github.event.inputs['release-notes'] }}
        run: |
          {
            echo "notes<<EOF"
            echo "## Release ${RELEASE_VERSION}"
            echo
            echo "### Build Artifacts"
            echo "- **Docker Images**: \`ghcr.io/${{ github.repository }}/[service]:${RELEASE_TAG}\`"
            echo "- **Binaries**: See assets below"
            echo

            if [ -n "$USER_RELEASE_NOTES" ]; then
              echo "### Release Notes"
              echo "$USER_RELEASE_NOTES"
              echo
            fi

            echo "### Recent Changes"
            echo '```'
            echo "$CHANGELOG"
            echo '```'
            echo
            echo "### Resources"
            echo "- [API Documentation](./docs/API_REFERENCE.md)"
            echo "- [Deployment Guide](./docs/DEPLOYMENT.md)"
            echo "- [Setup Guide](./docs/SETUP_GUIDE.md)"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          name: Release ${{ needs.prepare-release.outputs.version }}
          body: ${{ steps.prepare-notes.outputs.notes }}
          files: release-artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    name: Publish Release Packages
    runs-on: ubuntu-latest
    needs: [prepare-release, create-release]
    permissions:
      actions: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Trigger publish workflow
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'publish-packages.yml',
              ref: 'main',
              inputs: {
                version: '${{ needs.prepare-release.outputs.version }}'
              }
            })

  deploy-production:
    name: Deploy to Production Environment
    runs-on: ubuntu-latest
    needs: [prepare-release, create-release, publish-release]
    permissions:
      contents: read
      deployments: write
    concurrency:
      group: production-deployments
      cancel-in-progress: false
    environment:
      name: production
      url: ${{ steps.deployment-metadata.outputs.url }}
    outputs:
      deployment_url: ${{ steps.deployment-metadata.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Resolve deployment metadata
        id: deployment-metadata
        env:
          REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
          REPO_PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
        run: |
          if [ -n "$REPO_PRODUCTION_URL" ]; then
            DEPLOYMENT_URL="$REPO_PRODUCTION_URL"
          else
            DEPLOYMENT_URL="https://github.com/${REPOSITORY}/releases/tag/${RELEASE_TAG}"
          fi

          echo "url=${DEPLOYMENT_URL}" >> "$GITHUB_OUTPUT"

      - name: Mark deployment details
        run: |
          echo "🚀 Deployment prepared for production environment"
          echo "Version: ${{ needs.prepare-release.outputs.version }}"
          echo "Tag: ${{ needs.prepare-release.outputs.tag }}"
          echo "URL: ${{ steps.deployment-metadata.outputs.url }}"

          echo "## 🚀 Production Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Version**: ${{ needs.prepare-release.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tag**: ${{ needs.prepare-release.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Environment URL**: ${{ steps.deployment-metadata.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"

  post-release:
    name: Post-Release Tasks
    runs-on: ubuntu-latest
    needs: [prepare-release, publish-release, deploy-production]
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create release summary
        run: |
          echo "## 🎉 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: ${{ needs.prepare-release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag**: ${{ needs.prepare-release.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Release URL**: https://github.com/${{ github.repository }}/releases/tag/${{ needs.prepare-release.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Published Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Docker images pushed to GitHub Container Registry" >> $GITHUB_STEP_SUMMARY
          echo "- Binaries available in release assets" >> $GITHUB_STEP_SUMMARY
          echo "- GitHub release created and published" >> $GITHUB_STEP_SUMMARY
          echo "- Production deployment recorded: ${{ needs.deploy-production.outputs.deployment_url }}" >> $GITHUB_STEP_SUMMARY

