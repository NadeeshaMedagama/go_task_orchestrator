# ============================================================================
# CodeQL Security Analysis
# ============================================================================
# Performs static analysis for security vulnerabilities using GitHub CodeQL.
# Scans Go (backend) and JavaScript/TypeScript (frontend) code.
# ============================================================================

name: CodeQL Security Analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Run every Wednesday at 04:00 UTC
    - cron: "0 4 * * 3"

# concurrency:
#   group: ${{ github.workflow }}-${{ github.ref }}
#   cancel-in-progress: true

jobs:
  # ── CodeQL Analysis — Go (Backend) ────────────────────────────────────────
  analyze-go:
    name: CodeQL — Go Backend
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go
          queries: security-and-quality

      - name: Build backend
        run: go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:go"

  # ── CodeQL Analysis — JavaScript/TypeScript (Frontend) ────────────────────
  analyze-javascript:
    name: CodeQL — JavaScript/TypeScript Frontend
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"

