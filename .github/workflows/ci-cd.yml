# ============================================================================
# CI/CD Pipeline for Go Task Orchestrator
# ============================================================================
# Builds, tests, and validates the Go microservices and Next.js frontend.
# Includes CD publishing of Docker images to Docker Hub on push to main.
# Triggers on push/PR to main/develop, manual dispatch, and weekly schedule.
# ============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
  schedule:
    # Run every Monday at 06:00 UTC
    - cron: "0 6 * * 1"

env:
  GO_VERSION: "1.21"
  NODE_VERSION: "20"

jobs:
  # ── Go Backend — Build & Test ─────────────────────────────────────────────
  go-backend:
    name: Go Backend — Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Download Go dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Build API Gateway
        run: go build -o api-gateway ./cmd/api-gateway

      - name: Build Auth Service
        run: go build -o auth-service ./cmd/auth-service

      - name: Build Task Service
        run: go build -o task-service ./cmd/task-service

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: go-coverage
          path: coverage.out
          retention-days: 7

  # ── Frontend — Build & Lint ────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080/api
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: frontend/.next
          retention-days: 7

  # ── Docker Compose Validation ──────────────────────────────────────────────
  docker-validation:
    name: Docker — Validate Compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate docker-compose.yml
        run: docker compose config

  # ── All Checks Passed ─────────────────────────────────────────────────────
  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [go-backend, frontend-build, docker-validation]
    if: always()

    steps:
      - name: Check job status
        run: |
          if [[ "${{ needs.go-backend.result }}" != "success" ]] || \
             [[ "${{ needs.frontend-build.result }}" != "success" ]] || \
             [[ "${{ needs.docker-validation.result }}" != "success" ]]; then
            echo "❌ One or more checks failed"
            exit 1
          fi
          echo "✅ All checks passed!"

  # ── CD — Push Docker Images to Docker Hub ────────────────────────────────
  dockerhub-push:
    name: CD — Push Docker Images
    runs-on: ubuntu-latest
    needs: [all-checks]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - image_name: api-gateway
            dockerfile: ./deployments/docker/api-gateway.Dockerfile
            context: .
          - image_name: auth-service
            dockerfile: ./deployments/docker/auth-service.Dockerfile
            context: .
          - image_name: task-service
            dockerfile: ./deployments/docker/task-service.Dockerfile
            context: .
          - image_name: frontend
            dockerfile: ./frontend/Dockerfile
            context: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/go-task-orchestrator-${{ matrix.image_name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

